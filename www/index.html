<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>Tip Calculator</title>

<style>

:root{
--accent:#2563eb;
--radius:18px;
--shadow:0 8px 20px rgba(0,0,0,.12);
}

/* LIGHT MODE */
@media (prefers-color-scheme: light){
:root{
--bg1:#f6f8fb;
--bg2:#eef2f7;
--text:#0f172a;
--muted:#64748b;
--card:#ffffff;
--key:#ffffff;
--button:#f1f5f9;
--border:#e2e8f0;
}
}

/* DARK MODE */
@media (prefers-color-scheme: dark){
:root{
--bg1:#0f172a;
--bg2:#020617;
--text:#f1f5f9;
--muted:#94a3b8;
--card:#111827;
--key:#1f2937;
--button:#1e293b;
--border:#334155;
--shadow:0 10px 30px rgba(0,0,0,.6);
}
}

*{box-sizing:border-box}

html,body{
height:100%;
margin:0;
font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","Segoe UI",Roboto,Helvetica,Arial,sans-serif;
background:linear-gradient(180deg,var(--bg1),var(--bg2));
color:var(--text);
overflow:hidden;
}

body{
display:flex;
justify-content:center;
}

.app{
width:100%;
max-width:520px;
height:100vh;
display:flex;
flex-direction:column;
padding:calc(env(safe-area-inset-top) + 6px) calc(env(safe-area-inset-right) + 12px) calc(env(safe-area-inset-bottom) + 6px) calc(env(safe-area-inset-left) + 12px);
gap:10px;
}

.header{
font-size:22px;
font-weight:700;
padding:0 6px;
flex-shrink:0;
}

.main{
flex:1;
display:flex;
flex-direction:column;
gap:10px;
min-height:0;
}

.card{
background:var(--card);
border-radius:var(--radius);
padding:14px;
box-shadow:var(--shadow);
border:1px solid var(--border);
}

.display{
font-size:36px;
font-weight:700;
letter-spacing:.5px;
text-align:right;
margin-bottom:8px;
}

.controls{
display:flex;
gap:8px;
}

.control{
flex:1;
background:var(--button);
border-radius:12px;
padding:8px;
text-align:center;
}

.control-title{
font-size:11px;
color:var(--muted);
}

.control-value{
font-size:18px;
font-weight:600;
margin:4px 0;
}

.control-buttons{
display:flex;
}

.control-buttons button{
flex:1;
border:none;
background:var(--card);
color:var(--text);
border-radius:8px;
margin:2px;
padding:4px;
font-size:16px;
}

.tip-selector{
display:flex;
gap:6px;
margin-top:8px;
}

.tip-btn{
flex:1;
border:none;
background:var(--button);
color:var(--text);
padding:6px 0;
border-radius:10px;
font-size:12px;
}

.tip-btn.active{
background:var(--accent);
color:#fff;
font-weight:600;
}

.results{
display:grid;
grid-template-columns:1fr 1fr;
row-gap:6px;
column-gap:12px;
font-size:15px;
}

.results .label{
color:var(--muted);
}

.results .value{
text-align:right;
font-weight:600;
}

.results .total{
font-size:18px;
font-weight:700;
}

.round-row{
grid-column:span 2;
display:flex;
justify-content:space-between;
align-items:center;
margin-top:4px;
font-size:13px;
}

.round-toggle{
width:42px;
height:22px;
border-radius:20px;
background:#cbd5f5;
position:relative;
}

.round-toggle::after{
content:"";
position:absolute;
width:16px;
height:16px;
border-radius:50%;
background:white;
top:3px;
left:3px;
transition:.25s;
}

.round-toggle.active{
background:var(--accent);
}

.round-toggle.active::after{
left:23px;
}

.keypad{
flex:1;
display:grid;
grid-template-columns:repeat(3,1fr);
grid-auto-rows:1fr;
width:100%;
height:100%;
gap:8px;
align-content:stretch;
}

.key{
border:none;
border-radius:16px;
font-size:clamp(20px,4vh,28px);
background:var(--key);
color:var(--text);
box-shadow:var(--shadow);
width:100%;
aspect-ratio:1 / 1;
display:flex;
align-items:center;
justify-content:center;
}

/* If vertical space is larger than width (portrait phones), allow keys to stretch slightly */
@media (orientation: portrait){
.key{
height:100%;
aspect-ratio:auto;
}
}

.key:active{
transform:scale(.92);
}

.swipe-hint{
text-align:center;
font-size:11px;
color:var(--muted);
}

/* LANDSCAPE MODE */
@media (orientation: landscape){

.main{
flex-direction:row;
}

.left-panel{
flex:1;
min-height:0;
flex:1.1;
display:flex;
flex-direction:column;
gap:10px;
}

.right-panel{
flex:1;
display:flex;
flex-direction:column;
min-height:0;
flex:1;
display:flex;
flex-direction:column;
min-height:0;
flex:1;
display:flex;
flex-direction:column;
gap:10px;
}

.keypad{
height:100%;
}

}

</style>
</head>

<body>

<div class="app" id="app">

<div class="header">Tip Calculator</div>

<div class="main">

<div class="left-panel">

<div class="card">

<div id="subtotalDisplay" class="display">$0.00</div>

<div class="controls">

<div class="control">
<div class="control-title">People</div>
<div id="people" class="control-value">1</div>
<div class="control-buttons">
<button onclick="changePeople(1)">＋</button>
<button onclick="changePeople(-1)">−</button>
</div>
</div>

<div class="control">
<div class="control-title">Tip</div>
<div id="tipPercent" class="control-value">18%</div>
<div class="control-buttons">
<button onclick="changeTip(1)">＋</button>
<button onclick="changeTip(-1)">−</button>
</div>
</div>

</div>

<div class="tip-selector">
<button class="tip-btn" onclick="setTip(15)">15%</button>
<button class="tip-btn active" onclick="setTip(18)">18%</button>
<button class="tip-btn" onclick="setTip(20)">20%</button>
<button class="tip-btn" onclick="setTip(25)">25%</button>
</div>

</div>

<div class="card results">

<div class="label">Tip</div>
<div id="tipAmount" class="value">$0.00</div>

<div class="label total">Total</div>
<div id="totalAmount" class="value total">$0.00</div>

<div class="label">Per Person</div>
<div id="splitAmount" class="value">$0.00</div>

<div class="round-row">
<span>Round Total</span>
<div id="roundToggle" class="round-toggle" onclick="toggleRound()"></div>
</div>

</div>

</div>

<div class="right-panel">

<div class="keypad">
<button class="key" onclick="press('1')">1</button>
<button class="key" onclick="press('2')">2</button>
<button class="key" onclick="press('3')">3</button>

<button class="key" onclick="press('4')">4</button>
<button class="key" onclick="press('5')">5</button>
<button class="key" onclick="press('6')">6</button>

<button class="key" onclick="press('7')">7</button>
<button class="key" onclick="press('8')">8</button>
<button class="key" onclick="press('9')">9</button>

<button class="key" onclick="press('.')">.</button>
<button class="key" onclick="press('0')">0</button>
<button class="key" onclick="backspace()">⌫</button>
</div>

<div class="swipe-hint">Swipe left anywhere to clear</div>

</div>

</div>

</div>

<script>

let input="";
let people=1;
let tipPercent=18;
let roundTotal=false;

function haptic(){
// Very light haptic similar to native calculator taps
try{
if(window.Capacitor && Capacitor.Plugins && Capacitor.Plugins.Haptics){
Capacitor.Plugins.Haptics.selectionStart();
Capacitor.Plugins.Haptics.selectionEnd();
return;
}
}catch(e){}

// Softer browser fallback
if(navigator.vibrate){
navigator.vibrate(5);
}
});
return;
}
}catch(e){}

// Fallback for mobile browsers
if(navigator.vibrate){
navigator.vibrate(10);
}
}

function press(v){
if(v==='.' && input.includes('.')) return;
input+=v;
haptic();
update();
}

function backspace(){
input=input.slice(0,-1);
haptic();
update();
}

function clearInput(){
input="";
haptic();
update();
}

function toggleRound(){
roundTotal=!roundTotal;
document.getElementById('roundToggle').classList.toggle('active',roundTotal);
update();
}

function changePeople(v){
people=Math.max(1,people+v);
document.getElementById('people').innerText=people;
haptic();
update();
}

function changeTip(v){
tipPercent=Math.max(0,tipPercent+v);
document.getElementById('tipPercent').innerText=tipPercent+"%";
highlightTip();
haptic();
update();
}

function setTip(v){
tipPercent=v;
document.getElementById('tipPercent').innerText=v+"%";
highlightTip();
haptic();
update();
}

function highlightTip(){
document.querySelectorAll('.tip-btn').forEach(b=>{
b.classList.remove('active');
if(b.innerText===tipPercent+'%') b.classList.add('active');
});
}

function update(){

let subtotal=parseFloat(input||0);
let tip=subtotal*(tipPercent/100);
let total=subtotal+tip;

if(roundTotal){
total=Math.ceil(total);
tip=total-subtotal;
}

let split=total/people;

format(subtotal,'subtotalDisplay');
format(tip,'tipAmount');
format(total,'totalAmount');
format(split,'splitAmount');

}

function format(v,id){
let el=document.getElementById(id);
el.innerText=v.toLocaleString(undefined,{style:'currency',currency:'USD'});
}

let startX=null;

document.getElementById('app').addEventListener('touchstart',e=>{
startX=e.touches[0].clientX;
});

document.getElementById('app').addEventListener('touchend',e=>{
if(startX===null) return;

let endX=e.changedTouches[0].clientX;
let diff=startX-endX;

if(diff>120){
clearInput();
}

startX=null;
});

</script>

</body>
</html>
