<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>Tip Calculator</title>

<style>
:root{
--accent:#2563eb;
--radius:18px;
--shadow:0 8px 20px rgba(0,0,0,.12);
}

/* -----------------------------
   THEMES
------------------------------*/

/* Transparent glass */
body.transparent{
--text:#0f172a;
--muted:#475569;
--card:rgba(255,255,255,.28);
--key:rgba(255,255,255,.25);
--button:rgba(255,255,255,.22);
--border:rgba(255,255,255,.35);
--shadow:0 10px 30px rgba(0,0,0,.25);
}

/* Light */
body.light{
--text:#0f172a;
--muted:#64748b;
--card:#ffffff;
--key:#ffffff;
--button:#f1f5f9;
--border:#e2e8f0;
--shadow:0 8px 20px rgba(0,0,0,.12);
}

/* Dark */
body.dark{
--text:#f1f5f9;
--muted:#94a3b8;
--card:#111827;
--key:#1f2937;
--button:#1e293b;
--border:#334155;
--shadow:0 10px 30px rgba(0,0,0,.6);
}

*{box-sizing:border-box}

html,body{
height:100%;
margin:0;
font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","Segoe UI",Roboto,Helvetica,Arial,sans-serif;
color:var(--text);
overflow:hidden;
}

/* Proper backgrounds per theme */
body.transparent{
background:url("assets/background.jpg") center/cover no-repeat fixed;
}

body.light{
background:linear-gradient(180deg,#f6f8fb,#eef2f7);
}

body.dark{
background:linear-gradient(180deg,#0f172a,#020617);
}

body{
display:flex;
}

/* glass effect */
body.transparent .card,
body.transparent .key,
body.transparent .icon-btn,
body.transparent .control{
backdrop-filter:blur(22px) saturate(160%);
-webkit-backdrop-filter:blur(22px) saturate(160%);
}

.app{
width:100%;
height:100vh;
display:flex;
flex-direction:column;
padding:calc(env(safe-area-inset-top) + 6px) calc(env(safe-area-inset-right) + 12px) calc(env(safe-area-inset-bottom) + 6px) calc(env(safe-area-inset-left) + 12px);
gap:10px;
}

.header{
font-size:20px;
font-weight:700;
padding:0 6px;
display:flex;
align-items:center;
justify-content:space-between;
}

.header-actions{display:flex;gap:6px}

.icon-btn{
border:none;
background:var(--button);
color:var(--text);
border-radius:10px;
width:34px;
height:34px;
display:flex;
align-items:center;
justify-content:center;
font-size:16px;
}

.icon-btn:active{transform:scale(.92)}

.main{
flex:1;
display:flex;
flex-direction:column;
gap:10px;
min-height:0;
}

.card{
background:var(--card);
border-radius:var(--radius);
padding:14px;
box-shadow:var(--shadow);
border:1px solid var(--border);
}

.display{
font-size:clamp(22px,4vw,30px);
font-weight:700;
text-align:right;
margin-bottom:8px;
white-space:nowrap;
overflow:hidden;
text-overflow:ellipsis;
}

.controls{display:flex;gap:8px}

.control{
flex:1;
background:var(--button);
border-radius:12px;
padding:8px;
text-align:center;
}

.control-title{font-size:11px;color:var(--muted)}
.control-value{font-size:18px;font-weight:600;margin:4px 0}

.control-buttons{display:flex}

.control-buttons button{
flex:1;border:none;background:var(--card);color:var(--text);
border-radius:8px;margin:2px;padding:4px;font-size:16px;
}

.tip-selector{display:flex;gap:6px;margin-top:8px}

.tip-btn{
flex:1;border:none;background:var(--button);color:var(--text);
padding:6px 0;border-radius:10px;font-size:12px;
}

.tip-btn.active{background:var(--accent);color:#fff;font-weight:600}

.results{
display:grid;
grid-template-columns:1fr 1fr;
row-gap:8px;
column-gap:12px;
font-size:17px;
}

.results .label{color:var(--muted)}
.results .value{text-align:right;font-weight:600}
.results .total{font-size:22px;font-weight:700}

.round-row{
grid-column:span 2;
display:flex;
justify-content:space-between;
align-items:center;
font-size:13px;
}

.round-options{display:flex;gap:4px}

.round-btn{
border:none;background:var(--button);color:var(--text);
border-radius:8px;padding:3px 8px;font-size:12px;
}

.round-btn.active{background:var(--accent);color:#fff;font-weight:600}

/* Keypad fills remaining screen */
.keypad{
flex:1;
display:grid;
grid-template-columns:repeat(3,1fr);
grid-auto-rows:1fr;
width:100%;
height:100%;
gap:10px;
}

.key{
border:none;
border-radius:16px;
font-size:clamp(22px,5vh,30px);
background:var(--key);
color:var(--text);
box-shadow:var(--shadow);
display:flex;align-items:center;justify-content:center;
}

.key:active{transform:scale(.92)}

.swipe-hint{text-align:center;font-size:11px;color:var(--muted)}

/* Landscape layout improvements */
@media (orientation: landscape){

.app{
width:100%;
}

.main{
flex-direction:row;
height:100%;
}

.left-panel{
flex:1;
display:flex;
flex-direction:column;
gap:10px;
overflow:hidden;
}

.right-panel{
flex:1;
display:flex;
flex-direction:column;
gap:10px;
}

.results{
flex-shrink:0;
}

}

</style>
</head>

<body>

<div class="app" id="app">

<div class="header">
<span style="display:flex;align-items:center;gap:8px;">
<img src="assets/icon/icon-192.png" alt="app icon" style="width:22px;height:22px;border-radius:5px;">
Tip Calculator
</span>
<div class="header-actions">
<button class="icon-btn" id="cameraBtn" onclick="captureReceipt()">📷</button>
<button class="icon-btn" id="soundBtn" onclick="toggleSound()">🔊</button>
<button class="icon-btn" id="themeBtn" onclick="toggleTheme()">🫧</button>
</div>
</div>

<div class="main">

<div class="left-panel">

<div class="card">
<div id="subtotalDisplay" class="display">$0.00</div>

<div class="controls">

<div class="control">
<div class="control-title">People</div>
<div id="people" class="control-value">1</div>
<div class="control-buttons">
<button onclick="changePeople(1)">＋</button>
<button onclick="changePeople(-1)">−</button>
</div>
</div>

<div class="control">
<div class="control-title">Tip</div>
<div id="tipPercent" class="control-value">18%</div>
<div class="control-buttons">
<button onclick="changeTip(1)">＋</button>
<button onclick="changeTip(-1)">−</button>
</div>
</div>

</div>

<div class="tip-selector">
<button class="tip-btn" onclick="setTip(15)">15%</button>
<button class="tip-btn active" onclick="setTip(18)">18%</button>
<button class="tip-btn" onclick="setTip(20)">20%</button>
<button class="tip-btn" onclick="setTip(25)">25%</button>
</div>

</div>

<div class="card results">

<div class="label">Tip</div>
<div id="tipAmount" class="value">$0.00</div>

<div class="label total">Total</div>
<div id="totalAmount" class="value total">$0.00</div>

<div class="label">Per Person</div>
<div id="splitAmount" class="value">$0.00</div>

<div class="round-row">
<span>Rounding</span>
<div class="round-options">
<button class="round-btn active" onclick="setRounding('none')">None</button>
<button class="round-btn" onclick="setRounding('tip')">Tip</button>
<button class="round-btn" onclick="setRounding('total')">Total</button>
</div>
</div>

</div>

</div>

<div class="right-panel">

<div class="keypad">
<button class="key" onclick="press('1')">1</button>
<button class="key" onclick="press('2')">2</button>
<button class="key" onclick="press('3')">3</button>

<button class="key" onclick="press('4')">4</button>
<button class="key" onclick="press('5')">5</button>
<button class="key" onclick="press('6')">6</button>

<button class="key" onclick="press('7')">7</button>
<button class="key" onclick="press('8')">8</button>
<button class="key" onclick="press('9')">9</button>

<button class="key" onclick="press('.')">.</button>
<button class="key" onclick="press('0')">0</button>
<button class="key" onclick="backspace()">⌫</button>
</div>

<div class="swipe-hint">Swipe left anywhere to clear</div>

</div>

</div>

</div>

<script>

// -----------------------------
// App State
// -----------------------------
let inputRaw="";
let people=1;
let tipPercent=18;
let roundMode='none';
let soundEnabled=true;
let themeMode='transparent';

const MAX_INPUT_LENGTH=14;

// DOM
const app=document.getElementById('app');
const subtotalDisplay=document.getElementById('subtotalDisplay');
const tipAmount=document.getElementById('tipAmount');
const totalAmount=document.getElementById('totalAmount');
const splitAmount=document.getElementById('splitAmount');
const peopleDisplay=document.getElementById('people');
const tipPercentDisplay=document.getElementById('tipPercent');

// -----------------------------
// Restore theme
// -----------------------------
const savedTheme=localStorage.getItem('tipcalc-theme');
if(savedTheme){
 themeMode=savedTheme;
}
applyTheme();

// -----------------------------
// Audio click
// -----------------------------
let audioCtx=null;
let clickBuffer=null;

function initAudio(){
 if(audioCtx) return;
 try{
  audioCtx=new(window.AudioContext||window.webkitAudioContext)();
  const length=audioCtx.sampleRate*0.02;
  clickBuffer=audioCtx.createBuffer(1,length,audioCtx.sampleRate);
  const data=clickBuffer.getChannelData(0);
  for(let i=0;i<length;i++){
   data[i]=(Math.random()*2-1)*(1-i/length);
  }
 }catch(e){audioCtx=null}
}

function playClick(){
 if(!audioCtx||!clickBuffer) return;
 const source=audioCtx.createBufferSource();
 const gain=audioCtx.createGain();
 source.buffer=clickBuffer;
 gain.gain.value=0.12+Math.random()*0.05;
 source.playbackRate.value=0.95+Math.random()*0.1;
 source.connect(gain);
 gain.connect(audioCtx.destination);
 source.start();
}

// -----------------------------
// Theme
// -----------------------------
function applyTheme(){
 document.body.classList.remove('transparent','light','dark');
 document.body.classList.add(themeMode);

 const btn=document.getElementById('themeBtn');
 if(themeMode==='transparent') btn.innerText='🫧';
 if(themeMode==='light') btn.innerText='☀️';
 if(themeMode==='dark') btn.innerText='🌙';

 localStorage.setItem('tipcalc-theme',themeMode);
}

function toggleTheme(){
 if(themeMode==='transparent') themeMode='light';
 else if(themeMode==='light') themeMode='dark';
 else themeMode='transparent';

 applyTheme();
}

// -----------------------------
// Sound
// -----------------------------
function toggleSound(){
 soundEnabled=!soundEnabled;
 document.getElementById('soundBtn').innerText=soundEnabled?'🔊':'🔇';
}

// -----------------------------
// Keypad
// -----------------------------
function press(v){

 if(inputRaw.length>=MAX_INPUT_LENGTH) return;

 if(v==='.' && inputRaw.includes('.')) return;

 inputRaw+=v;
 update();
}

function backspace(){
 if(!inputRaw) return;
 inputRaw=inputRaw.slice(0,-1);
 update();
}

function clearInput(){
 inputRaw="";
 update();
}

// -----------------------------
// Settings
// -----------------------------
function changePeople(v){
 people=Math.max(1,people+v);
 peopleDisplay.innerText=people;
 update();
}

function changeTip(v){
 tipPercent=Math.max(0,tipPercent+v);
 tipPercentDisplay.innerText=tipPercent+"%";
 highlightTip();
 update();
}

function setTip(v){
 tipPercent=v;
 tipPercentDisplay.innerText=v+"%";
 highlightTip();
 update();
}

function setRounding(mode){
 roundMode=mode;
 document.querySelectorAll('.round-btn').forEach(btn=>{
  btn.classList.toggle('active',btn.innerText.toLowerCase()===mode);
 });
 update();
}

function highlightTip(){
 document.querySelectorAll('.tip-btn').forEach(btn=>{
  btn.classList.toggle('active',btn.innerText===tipPercent+'%');
 });
}

// -----------------------------
// Calculations
// -----------------------------
function update(){

 const subtotal=parseFloat(inputRaw||0);
 let tip=subtotal*(tipPercent/100);
 let total=subtotal+tip;

 if(roundMode==='total'){
  total=Math.ceil(total);
  tip=total-subtotal;
 }

 if(roundMode==='tip'){
  tip=Math.ceil(tip);
  total=subtotal+tip;
 }

 const split=total/people;

 subtotalDisplay.innerText=formatInput(inputRaw);

 format(tip,tipAmount);
 format(total,totalAmount);
 format(split,splitAmount);
}

function format(v,el){
 el.innerText=v.toLocaleString(undefined,{style:'currency',currency:'USD'});
}

function formatInput(value){

 if(!value) return '$0.00';

 const parts=value.split('.');
 const whole=parts[0]||'0';
 const decimal=parts[1]??null;

 const formattedWhole=parseInt(whole,10).toLocaleString();

 if(decimal!==null){
  return '$'+formattedWhole+'.'+decimal;
 }

 return '$'+formattedWhole;
}

// -----------------------------
// Long Press Delete
// -----------------------------
let deleteInterval=null;
const deleteKey=document.querySelector('.keypad button:last-child');

if(deleteKey){
 deleteKey.addEventListener('pointerdown',()=>{
  if(deleteInterval) return;

  deleteInterval=setInterval(()=>{
   if(!inputRaw){
    clearInterval(deleteInterval);
    deleteInterval=null;
    return;
   }

   inputRaw=inputRaw.slice(0,-1);
   update();

  },120);
 });

 deleteKey.addEventListener('pointerup',()=>{
  clearInterval(deleteInterval);
  deleteInterval=null;
 });

 deleteKey.addEventListener('pointerleave',()=>{
  clearInterval(deleteInterval);
  deleteInterval=null;
 });
}

// -----------------------------
// Pointerdown sound trigger
// -----------------------------
app.addEventListener('pointerdown',e=>{

 const btn=e.target.closest('button');
 if(!btn) return;

 if(!soundEnabled) return;

 if(!audioCtx) initAudio();

 try{playClick()}catch(err){}

});

// -----------------------------
// Swipe Clear
// -----------------------------
let startX=null;

app.addEventListener('touchstart',e=>{
 startX=e.touches[0].clientX;
});

app.addEventListener('touchend',e=>{
 if(startX===null) return;
 const endX=e.changedTouches[0].clientX;
 if(startX-endX>120) clearInput();
 startX=null;
});

update();

// -----------------------------
// Receipt Camera OCR (On-device)
// -----------------------------

// -----------------------------
// Advanced Receipt Scanner (On-device)
// -----------------------------

let scannerStream=null;
let scannerVideo=null;
let scannerOverlay=null;

async function captureReceipt(){

 try{

  scannerStream = await navigator.mediaDevices.getUserMedia({
   video:{facingMode:'environment',width:{ideal:1920},height:{ideal:1080}}
  });

  scannerVideo=document.createElement('video');
  scannerVideo.autoplay=true;
  scannerVideo.playsInline=true;
  scannerVideo.srcObject=scannerStream;

  scannerOverlay=document.createElement('div');
  scannerOverlay.style.position='fixed';
  scannerOverlay.style.top='0';
  scannerOverlay.style.left='0';
  scannerOverlay.style.width='100%';
  scannerOverlay.style.height='100%';
  scannerOverlay.style.zIndex='9999';
  scannerOverlay.style.background='black';

  scannerVideo.style.width='100%';
  scannerVideo.style.height='100%';
  scannerVideo.style.objectFit='cover';

  const guide=document.createElement('div');
  guide.style.position='absolute';
  guide.style.border='3px solid rgba(255,255,255,.9)';
  guide.style.borderRadius='14px';
  guide.style.width='80%';
  guide.style.height='60%';
  guide.style.top='20%';
  guide.style.left='10%';
  guide.style.boxShadow='0 0 0 2000px rgba(0,0,0,.45)';

  const captureBtn=document.createElement('button');
  captureBtn.innerText='Scan Receipt';
  captureBtn.style.position='absolute';
  captureBtn.style.bottom='40px';
  captureBtn.style.left='50%';
  captureBtn.style.transform='translateX(-50%)';
  captureBtn.style.padding='14px 22px';
  captureBtn.style.fontSize='16px';
  captureBtn.style.borderRadius='14px';
  captureBtn.style.border='none';
  captureBtn.style.background='#2563eb';
  captureBtn.style.color='white';

  scannerOverlay.appendChild(scannerVideo);
  scannerOverlay.appendChild(guide);
  scannerOverlay.appendChild(captureBtn);

  document.body.appendChild(scannerOverlay);

  captureBtn.onclick=captureFrame;

 }catch(e){
  alert('Camera unavailable');
 }
}

function closeScanner(){
 if(scannerStream){
  scannerStream.getTracks().forEach(t=>t.stop());
 }
 if(scannerOverlay) scannerOverlay.remove();
 scannerOverlay=null;
 scannerVideo=null;
}

function captureFrame(){

 const canvas=document.createElement('canvas');
 canvas.width=scannerVideo.videoWidth;
 canvas.height=scannerVideo.videoHeight;

 const ctx=canvas.getContext('2d');
 ctx.drawImage(scannerVideo,0,0);

 closeScanner();

 const processed=detectReceiptAndCrop(canvas);
 processReceipt(processed);
}

// -----------------------------
// OpenCV Edge Detection + Perspective Correction
// -----------------------------

function detectReceiptAndCrop(canvas){

 if(typeof cv === 'undefined'){
  // fallback to original canvas if OpenCV not loaded
  return canvas;
 }

 const src=cv.imread(canvas);
 const gray=new cv.Mat();
 const blur=new cv.Mat();
 const edges=new cv.Mat();

 cv.cvtColor(src,gray,cv.COLOR_RGBA2GRAY);
 cv.GaussianBlur(gray,blur,new cv.Size(5,5),0);
 cv.Canny(blur,edges,75,200);

 const contours=new cv.MatVector();
 const hierarchy=new cv.Mat();

 cv.findContours(edges,contours,hierarchy,cv.RETR_LIST,cv.CHAIN_APPROX_SIMPLE);

 let maxArea=0;
 let bestContour=null;

 for(let i=0;i<contours.size();i++){
  const cnt=contours.get(i);
  const area=cv.contourArea(cnt);

  if(area>maxArea){
   const peri=cv.arcLength(cnt,true);
   const approx=new cv.Mat();
   cv.approxPolyDP(cnt,approx,0.02*peri,true);

   if(approx.rows===4){
    maxArea=area;
    bestContour=approx;
   }
  }
 }

 if(!bestContour){
  src.delete();gray.delete();blur.delete();edges.delete();
  contours.delete();hierarchy.delete();
  return canvas;
 }

 const pts=[];
 for(let i=0;i<4;i++){
  pts.push({
   x:bestContour.intPtr(i,0)[0],
   y:bestContour.intPtr(i,0)[1]
  });
 }

 pts.sort((a,b)=>a.y-b.y);
 const top=pts.slice(0,2).sort((a,b)=>a.x-b.x);
 const bottom=pts.slice(2,4).sort((a,b)=>a.x-b.x);

 const ordered=[top[0],top[1],bottom[1],bottom[0]];

 const width=Math.max(
  Math.hypot(ordered[1].x-ordered[0].x,ordered[1].y-ordered[0].y),
  Math.hypot(ordered[2].x-ordered[3].x,ordered[2].y-ordered[3].y)
 );

 const height=Math.max(
  Math.hypot(ordered[3].x-ordered[0].x,ordered[3].y-ordered[0].y),
  Math.hypot(ordered[2].x-ordered[1].x,ordered[2].y-ordered[1].y)
 );

 const dst=cv.matFromArray(4,1,cv.CV_32FC2,[
  0,0,
  width,0,
  width,height,
  0,height
 ]);

 const srcPts=cv.matFromArray(4,1,cv.CV_32FC2,[
  ordered[0].x,ordered[0].y,
  ordered[1].x,ordered[1].y,
  ordered[2].x,ordered[2].y,
  ordered[3].x,ordered[3].y
 ]);

 const M=cv.getPerspectiveTransform(srcPts,dst);
 const warped=new cv.Mat();

 cv.warpPerspective(src,warped,M,new cv.Size(width,height));

 const resultCanvas=document.createElement('canvas');
 resultCanvas.width=width;
 resultCanvas.height=height;

 cv.imshow(resultCanvas,warped);

 src.delete();gray.delete();blur.delete();edges.delete();
 contours.delete();hierarchy.delete();warped.delete();

 return resultCanvas;
}

// -----------------------------
// ML Kit Text Recognition (Capacitor)
// -----------------------------

async function processReceipt(canvas){
 try{

  if(!window.Capacitor || !Capacitor.Plugins || !Capacitor.Plugins.TextRecognition){
   alert('ML Kit TextRecognition plugin not available');
   return;
  }

  const base64=canvas.toDataURL('image/jpeg',0.9).split(',')[1];

  const result=await Capacitor.Plugins.TextRecognition.recognize({
   image:base64
  });

  let text='';

  if(result && result.blocks){
   result.blocks.forEach(block=>{
    block.lines.forEach(line=>{
     text+=line.text+'
';
    });
   });
  }

  const total=findReceiptTotal(text);

  if(total){
   inputRaw=String(total);
   update();
   alert('Detected total: $'+total);
  }else{
   alert('Could not detect receipt total');
  }

 }catch(e){
  console.error(e);
  alert('Receipt recognition failed');
 }
}

// -----------------------------
// Receipt Parsing Heuristics
// -----------------------------

function findReceiptTotal(text){

 const lines=text.split('\n');
 let candidates=[];

 for(const line of lines){
  const lower=line.toLowerCase();

  if(lower.includes('total')||lower.includes('amount')||lower.includes('balance')){
   const match=line.match(/(\d+\.\d{2})/);
   if(match) candidates.push(parseFloat(match[1]));
  }
 }

 if(candidates.length===0){
  const fallback=text.match(/(\d+\.\d{2})/g);
  if(!fallback) return null;
  return Math.max(...fallback.map(v=>parseFloat(v)));
 }

 return Math.max(...candidates);
}

</script>

</body>
</html>
