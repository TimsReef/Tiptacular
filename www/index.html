<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>Tip Calculator</title>

<style>

:root{
--accent:#2563eb;
--radius:18px;
--shadow:0 8px 20px rgba(0,0,0,.12);
}

body.light{
--bg1:#f6f8fb;
--bg2:#eef2f7;
--text:#0f172a;
--muted:#64748b;
--card:#ffffff;
--key:#ffffff;
--button:#f1f5f9;
--border:#e2e8f0;
}

body.dark{
--bg1:#0f172a;
--bg2:#020617;
--text:#f1f5f9;
--muted:#94a3b8;
--card:#111827;
--key:#1f2937;
--button:#1e293b;
--border:#334155;
--shadow:0 10px 30px rgba(0,0,0,.6);
}

:root{
--accent:#2563eb;
--radius:18px;
--shadow:0 8px 20px rgba(0,0,0,.12);
}

/* LIGHT MODE */
@media (prefers-color-scheme: light){
:root{
--bg1:#f6f8fb;
--bg2:#eef2f7;
--text:#0f172a;
--muted:#64748b;
--card:#ffffff;
--key:#ffffff;
--button:#f1f5f9;
--border:#e2e8f0;
}
}

/* DARK MODE */
@media (prefers-color-scheme: dark){
:root{
--bg1:#0f172a;
--bg2:#020617;
--text:#f1f5f9;
--muted:#94a3b8;
--card:#111827;
--key:#1f2937;
--button:#1e293b;
--border:#334155;
--shadow:0 10px 30px rgba(0,0,0,.6);
}
}

*{box-sizing:border-box}

html,body{
height:100%;
margin:0;
font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","Segoe UI",Roboto,Helvetica,Arial,sans-serif;
background:linear-gradient(180deg,var(--bg1),var(--bg2));
color:var(--text);
overflow:hidden;
}

body{
display:flex;
justify-content:center;
}

.app{
width:100%;
max-width:520px;
height:100vh;
display:flex;
flex-direction:column;
padding:calc(env(safe-area-inset-top) + 6px) calc(env(safe-area-inset-right) + 12px) calc(env(safe-area-inset-bottom) + 6px) calc(env(safe-area-inset-left) + 12px);
gap:10px;
}

.header{
font-size:20px;
font-weight:700;
padding:0 6px;
flex-shrink:0;
display:flex;
align-items:center;
justify-content:space-between;
}

.header-actions{
display:flex;
gap:6px;
}

.icon-btn{
border:none;
background:var(--button);
color:var(--text);
border-radius:10px;
width:34px;
height:34px;
display:flex;
align-items:center;
justify-content:center;
font-size:16px;
}

.icon-btn:active{
transform:scale(.92);
}

.main{
flex:1;
display:flex;
flex-direction:column;
gap:10px;
min-height:0;
}

.card{
background:var(--card);
border-radius:var(--radius);
padding:14px;
box-shadow:var(--shadow);
border:1px solid var(--border);
}

.display{
font-size:30px;
font-weight:700;
letter-spacing:.5px;
text-align:right;
margin-bottom:8px;
}

.controls{
display:flex;
gap:8px;
}

.control{
flex:1;
background:var(--button);
border-radius:12px;
padding:8px;
text-align:center;
}

.control-title{
font-size:11px;
color:var(--muted);
}

.control-value{
font-size:18px;
font-weight:600;
margin:4px 0;
}

.control-buttons{
display:flex;
}

.control-buttons button{
flex:1;
border:none;
background:var(--card);
color:var(--text);
border-radius:8px;
margin:2px;
padding:4px;
font-size:16px;
}

.tip-selector{
display:flex;
gap:6px;
margin-top:8px;
}

.tip-btn{
flex:1;
border:none;
background:var(--button);
color:var(--text);
padding:6px 0;
border-radius:10px;
font-size:12px;
}

.tip-btn.active{
background:var(--accent);
color:#fff;
font-weight:600;
}

.results{
display:grid;
grid-template-columns:1fr 1fr;
row-gap:8px;
column-gap:12px;
font-size:17px;
}

.results .label{
color:var(--muted);
}

.results .value{
text-align:right;
font-weight:600;
}

.results .total{
font-size:22px;
font-weight:700;
}

.round-row{
grid-column:span 2;
display:flex;
justify-content:space-between;
align-items:center;
margin-top:4px;
font-size:13px;
}

.round-options{
display:flex;
gap:4px;
}

.round-btn{
border:none;
background:var(--button);
color:var(--text);
border-radius:8px;
padding:3px 8px;
font-size:12px;
}

.round-btn.active{
background:var(--accent);
color:#fff;
font-weight:600;
}

.round-toggle{
width:42px;
height:22px;
border-radius:20px;
background:#cbd5f5;
position:relative;
}

.round-toggle::after{
content:"";
position:absolute;
width:16px;
height:16px;
border-radius:50%;
background:white;
top:3px;
left:3px;
transition:.25s;
}

.round-toggle.active{
background:var(--accent);
}

.round-toggle.active::after{
left:23px;
}

.keypad{
flex:1;
display:grid;
grid-template-columns:repeat(3,1fr);
grid-auto-rows:1fr;
width:100%;
height:100%;
gap:8px;
align-content:stretch;
}

.key{
border:none;
border-radius:16px;
font-size:clamp(20px,4vh,28px);
background:var(--key);
color:var(--text);
box-shadow:var(--shadow);
width:100%;
aspect-ratio:1 / 1;
display:flex;
align-items:center;
justify-content:center;
}

/* If vertical space is larger than width (portrait phones), allow keys to stretch slightly */
@media (orientation: portrait){
.key{
height:100%;
aspect-ratio:auto;
}
}

.key:active{
transform:scale(.92);
}

.swipe-hint{
text-align:center;
font-size:11px;
color:var(--muted);
}

/* LANDSCAPE MODE */
@media (orientation: landscape){

.main{
flex-direction:row;
}

.left-panel{
flex:1;
min-height:0;
flex:1.1;
display:flex;
flex-direction:column;
gap:10px;
}

.right-panel{
flex:1;
display:flex;
flex-direction:column;
min-height:0;
gap:10px;
}

.keypad{
height:100%;
}

}

</style>
</head>

<body>

<div class="app" id="app">

<div class="header">
<span style="display:flex;align-items:center;gap:8px;">
<img src="assets/icon/icon-192.png" alt="app icon" style="width:22px;height:22px;border-radius:5px;">
Tip Calculator
</span>
<div class="header-actions">
<button class="icon-btn" id="soundBtn" onclick="toggleSound()">🔊</button>
<button class="icon-btn" id="themeBtn" onclick="toggleTheme()">🌙</button>
</div>
</div>

<div class="main">

<div class="left-panel">

<div class="card">

<div id="subtotalDisplay" class="display">$0.00</div>

<div class="controls">

<div class="control">
<div class="control-title">People</div>
<div id="people" class="control-value">1</div>
<div class="control-buttons">
<button onclick="changePeople(1)">＋</button>
<button onclick="changePeople(-1)">−</button>
</div>
</div>

<div class="control">
<div class="control-title">Tip</div>
<div id="tipPercent" class="control-value">18%</div>
<div class="control-buttons">
<button onclick="changeTip(1)">＋</button>
<button onclick="changeTip(-1)">−</button>
</div>
</div>

</div>

<div class="tip-selector">
<button class="tip-btn" onclick="setTip(15)">15%</button>
<button class="tip-btn active" onclick="setTip(18)">18%</button>
<button class="tip-btn" onclick="setTip(20)">20%</button>
<button class="tip-btn" onclick="setTip(25)">25%</button>
</div>

</div>

<div class="card results">

<div class="label">Tip</div>
<div id="tipAmount" class="value">$0.00</div>

<div class="label total">Total</div>
<div id="totalAmount" class="value total">$0.00</div>

<div class="label">Per Person</div>
<div id="splitAmount" class="value">$0.00</div>

<div class="round-row">
<span>Rounding</span>
<div class="round-options">
<button class="round-btn active" onclick="setRounding('none')">None</button>
<button class="round-btn" onclick="setRounding('tip')">Tip</button>
<button class="round-btn" onclick="setRounding('total')">Total</button>
</div>
</div>

</div>

</div>

<div class="right-panel">

<div class="keypad">
<button class="key" onclick="press('1')">1</button>
<button class="key" onclick="press('2')">2</button>
<button class="key" onclick="press('3')">3</button>

<button class="key" onclick="press('4')">4</button>
<button class="key" onclick="press('5')">5</button>
<button class="key" onclick="press('6')">6</button>

<button class="key" onclick="press('7')">7</button>
<button class="key" onclick="press('8')">8</button>
<button class="key" onclick="press('9')">9</button>

<button class="key" onclick="press('.')">.</button>
<button class="key" onclick="press('0')">0</button>
<button class="key" onclick="backspace()">⌫</button>
</div>

<div class="swipe-hint">Swipe left anywhere to clear</div>

</div>

</div>

</div>

<script>

// -----------------------------
// Application State
// -----------------------------
let input = "";
let people = 1;
let tipPercent = 18;
let roundMode = 'none';
let soundEnabled = true;
let manualTheme = null;

// Cache DOM references
const app = document.getElementById('app');
const subtotalDisplay = document.getElementById('subtotalDisplay');
const tipAmount = document.getElementById('tipAmount');
const totalAmount = document.getElementById('totalAmount');
const splitAmount = document.getElementById('splitAmount');
const peopleDisplay = document.getElementById('people');
const tipPercentDisplay = document.getElementById('tipPercent');
// rounding buttons handled dynamically

// -----------------------------
// Key Click Sound Feedback
// -----------------------------
let audioCtx = null;

function haptic(){
  if(!soundEnabled) return;
  try{
    if(!audioCtx){
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }

    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();

    osc.type = 'square';
    osc.frequency.value = 1200;

    gain.gain.value = 0.03;

    osc.connect(gain);
    gain.connect(audioCtx.destination);

    const now = audioCtx.currentTime;

    osc.start(now);
    osc.stop(now + 0.02);

  }catch(e){
    // audio not available
  }
}

// -----------------------------
// Theme + Sound Controls
// -----------------------------

function toggleSound(){
  soundEnabled = !soundEnabled;
  document.getElementById('soundBtn').innerText = soundEnabled ? '🔊' : '🔇';
}

function toggleTheme(){
  const body = document.body;

  if(manualTheme === 'dark'){
    manualTheme = 'light';
    body.classList.remove('dark');
    body.classList.add('light');
    document.getElementById('themeBtn').innerText = '☀️';
  }
  else if(manualTheme === 'light'){
    manualTheme = null;
    body.classList.remove('light');
    body.classList.remove('dark');
    document.getElementById('themeBtn').innerText = '🌙';
  }
  else{
    manualTheme = 'dark';
    body.classList.remove('light');
    body.classList.add('dark');
    document.getElementById('themeBtn').innerText = '🌙';
  }
}
  else{
    manualTheme = 'dark';
    body.classList.remove('light');
    body.classList.add('dark');
    document.getElementById('themeBtn').innerText = '🌙';
  }
}
  else if(manualTheme === 'light'){
    manualTheme = null;
    root.style.colorScheme = '';
    document.getElementById('themeBtn').innerText = '🌙';
  }
  else{
    manualTheme = 'dark';
    root.style.colorScheme = 'dark';
    document.getElementById('themeBtn').innerText = '🌙';
  }
}

// -----------------------------
// Keypad Input
// -----------------------------
function press(value){
  if(value === '.' && input.includes('.')) return;
  input += value;
  haptic();
  update();
}

function backspace(){
  if(input.length === 0) return;
  input = input.slice(0, -1);
  haptic();
  update();
}

function clearInput(){
  if(input === "") return;
  input = "";
  haptic();
  update();
}

// -----------------------------
// Controls
// -----------------------------
function changePeople(delta){
  people = Math.max(1, people + delta);
  peopleDisplay.innerText = people;
  haptic();
  update();
}

function changeTip(delta){
  tipPercent = Math.max(0, tipPercent + delta);
  tipPercentDisplay.innerText = tipPercent + "%";
  highlightTip();
  haptic();
  update();
}

function setTip(value){
  tipPercent = value;
  tipPercentDisplay.innerText = value + "%";
  highlightTip();
  haptic();
  update();
}

function setRounding(mode){
  roundMode = mode;

  document.querySelectorAll('.round-btn').forEach(btn=>{
    btn.classList.toggle('active', btn.innerText.toLowerCase() === mode);
  });

  haptic();
  update();
}

function highlightTip(){
  document.querySelectorAll('.tip-btn').forEach(btn => {
    btn.classList.toggle('active', btn.innerText === tipPercent + '%');
  });
}

// -----------------------------
// Calculations
// -----------------------------
function update(){

  const subtotal = parseFloat(input || 0);

  let tip = subtotal * (tipPercent / 100);
  let total = subtotal + tip;

  if(roundMode === 'total'){
    total = Math.ceil(total);
    tip = total - subtotal;
  }

  if(roundMode === 'tip'){
    tip = Math.ceil(tip);
    total = subtotal + tip;
  }

  const split = total / people;

  format(subtotal, subtotalDisplay);
  format(tip, tipAmount);
  format(total, totalAmount);
  format(split, splitAmount);
}

// -----------------------------
// Formatting
// -----------------------------
function format(value, element){
  element.innerText = value.toLocaleString(undefined, {
    style: 'currency',
    currency: 'USD'
  });
}

// -----------------------------
// Swipe Gesture (Clear)
// -----------------------------
let startX = null;

app.addEventListener('touchstart', e => {
  startX = e.touches[0].clientX;
});

app.addEventListener('touchend', e => {
  if(startX === null) return;

  const endX = e.changedTouches[0].clientX;
  const diff = startX - endX;

  if(diff > 120){
    clearInput();
  }

  startX = null;
});

// Initial render
update();

</script>

</body>
</html>
